<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary Messenger</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Temporary Messenger</h1>
            <p>Enter a display name and join the chat immediately—no account required.</p>

            <input
                type="text"
                id="username"
                placeholder="Enter your username"
                maxlength="20"
                autocomplete="off"
            >

            <button id="joinBtn">
                Join Chat
            </button>
            <p class="card-note">Your chat is temporary and session-based — refresh to start fresh.</p>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
